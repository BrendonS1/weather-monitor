<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS-B Embed</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #map { width: 100%; height: 100%; background: #070b0f; overflow: hidden; }
  .leaflet-container { background: #070b0f; }
  .leaflet-control-zoom { display: none; }
  .leaflet-control-attribution { display: none; }
  .plane-label { background: none !important; border: none !important; }
  .ac-map-label { background: none; border: none; pointer-events: none; white-space: nowrap; }
  .ac-map-label-inner {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; line-height: 1.3; padding: 2px 4px;
    background: rgba(7,11,15,0.75);
    border-left: 1px solid rgba(0,212,255,0.4);
    color: #c8dde8;
  }
  .ac-map-label-inner .lbl-call { color: #00d4ff; }
  .ac-map-label-inner .lbl-alt  { color: #00ff9d; }
</style>
</head>
<body>
<div id="map"></div>
<script>
const PROXY = 'https://weather-monitor-proxy-production.up.railway.app';
const LAT = -36.65639;
const LON = 174.65602;

const map = L.map('map', {
  center: [LAT, LON],
  zoom: 10,
  zoomControl: false,
  attributionControl: false,
  dragging: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  boxZoom: false,
  keyboard: false,
  touchZoom: false,
});

// Shift center so NZNE appears 25% up from the bottom of the widget
map.whenReady(() => {
  const size = map.getSize();
  const nznePx = map.project([LAT, LON], map.getZoom());
  // Target: NZNE at 75% from top (25% from bottom); currently at 50% (center)
  const dy = size.y * (window.innerWidth > 768 ? 0.35 : 0.40); // desktop: 85% from top, mobile: 90%
  const newCenter = map.unproject([nznePx.x, nznePx.y - dy], map.getZoom());
  map.setView(newCenter, map.getZoom(), { animate: false });
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

// Airfield marker
const airfieldIcon = L.divIcon({
  className: '',
  html: `<svg width="14" height="14" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="9" cy="9" r="8" stroke="#00ff9d" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
    <circle cx="9" cy="9" r="3" fill="#00ff9d" opacity="0.7"/>
    <line x1="9" y1="1" x2="9" y2="5" stroke="#00ff9d" stroke-width="1.5"/>
    <line x1="9" y1="13" x2="9" y2="17" stroke="#00ff9d" stroke-width="1.5"/>
    <line x1="1" y1="9" x2="5" y2="9" stroke="#00ff9d" stroke-width="1.5"/>
    <line x1="13" y1="9" x2="17" y2="9" stroke="#00ff9d" stroke-width="1.5"/>
  </svg>`,
  iconSize: [14, 14], iconAnchor: [7, 7],
});
L.marker([LAT, LON], { icon: airfieldIcon }).addTo(map);

function planeIcon(track) {
  return L.divIcon({
    className: 'plane-label',
    html: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
      style="transform:rotate(${track || 0}deg); filter:drop-shadow(0 0 3px #00b84d88)">
      <path d="M12 2L8 10H3L5 14H9L7 22H12H17L15 14H19L21 10H16L12 2Z" fill="#00b84d" opacity="0.9"/>
      <path d="M12 2L8 10H16L12 2Z" fill="#00b84d"/>
    </svg>`,
    iconSize: [18, 18], iconAnchor: [9, 9],
  });
}

function speedVectorEndpoint(lat, lon, trackDeg, speedKt) {
  const distNM = speedKt * (2 / 60);
  const distKm = distNM * 1.852;
  const trackRad = trackDeg * Math.PI / 180;
  const dlat = (distKm / 111.32) * Math.cos(trackRad);
  const dlon = (distKm / (111.32 * Math.cos(lat * Math.PI / 180))) * Math.sin(trackRad);
  return [lat + dlat, lon + dlon];
}

// ── ALTITUDE FORMATTING (mirrors main tracker) ────────────────────────────
const TRANSITION_ALT_FT = 13000;
const STD_QNH = 1013.25;
let currentQNH = STD_QNH;

function pressureAltToQNH(ft, qnh) { return ft + (qnh - STD_QNH) * 27; }

function fmtAlt(pressureAltFt) {
  if (pressureAltFt == null || pressureAltFt === '') return '';
  const ft = Number(pressureAltFt);
  if (ft >= TRANSITION_ALT_FT) {
    return 'FL' + String(Math.round(ft / 100)).padStart(3, '0');
  }
  const hundreds = Math.round(pressureAltToQNH(ft, currentQNH) / 100);
  return 'A' + String(Math.max(0, hundreds)).padStart(3, '0');
}

function planeLabelIcon(callsign, alt) {
  const call = (callsign || '').trim() || '?';
  return L.divIcon({
    className: 'ac-map-label',
    html: `<div class="ac-map-label-inner">
      <span class="lbl-call">${call}</span><br>
      <span class="lbl-alt">${fmtAlt(alt)}</span>
    </div>`,
    iconSize: null,
    iconAnchor: [-14, 10],
  });
}

async function fetchQNH() {
  try {
    const res = await fetch(`${PROXY}/?url=${encodeURIComponent('http://weather.nsac.co.nz/NEmetData.txt')}`);
    const data = await res.json();
    const qnh = Math.round(data.thb0seapress);
    if (qnh >= 900 && qnh <= 1100) currentQNH = qnh;
  } catch (e) { /* use default */ }
}

let markers = {};
let labelMarkers = {};
let vectorLines = {};

async function fetchFlights() {
  try {
    const res = await fetch(`${PROXY}/api/adsb?lat=${LAT}&lon=${LON}&dist=60`);
    const json = await res.json();
    if (json.error) return;
    const aircraft = (json.ac || []).filter(a => a.lat && a.lon);

    const currentHexes = new Set(aircraft.map(a => a.hex));
    for (const hex of Object.keys(markers)) {
      if (!currentHexes.has(hex)) {
        markers[hex].remove(); delete markers[hex];
        if (labelMarkers[hex]) { labelMarkers[hex].remove(); delete labelMarkers[hex]; }
        if (vectorLines[hex]) { vectorLines[hex].remove(); delete vectorLines[hex]; }
      }
    }

    aircraft.forEach(ac => {
      if (ac.track != null && ac.gs) {
        const tip = speedVectorEndpoint(ac.lat, ac.lon, ac.track, ac.gs);
        if (vectorLines[ac.hex]) {
          vectorLines[ac.hex].setLatLngs([[ac.lat, ac.lon], tip]);
        } else {
          vectorLines[ac.hex] = L.polyline([[ac.lat, ac.lon], tip], {
            color: '#ff6600', weight: 1.5, opacity: 0.8, interactive: false,
          }).addTo(map);
        }
      }

      if (markers[ac.hex]) {
        markers[ac.hex].setLatLng([ac.lat, ac.lon]);
        markers[ac.hex].setIcon(planeIcon(ac.track));
        if (labelMarkers[ac.hex]) {
          labelMarkers[ac.hex].setLatLng([ac.lat, ac.lon]);
          labelMarkers[ac.hex].setIcon(planeLabelIcon(ac.flight, ac.alt_baro));
        }
      } else {
        markers[ac.hex] = L.marker([ac.lat, ac.lon], {
          icon: planeIcon(ac.track), zIndexOffset: 100,
        }).addTo(map);
        labelMarkers[ac.hex] = L.marker([ac.lat, ac.lon], {
          icon: planeLabelIcon(ac.flight, ac.alt_baro), zIndexOffset: 99, interactive: false,
        }).addTo(map);
      }
    });
  } catch (e) {
    console.error('ADS-B embed fetch error:', e);
  }
}

// ── FILTERED AIRSPACE ──────────────────────
const ALLOWED_ASP = new Set(['NZA153','NZG153','NZC172','NZA146','NZB178','NZD125','NZD130']);

function normalizeAspName(name) {
  return String(name || '').toUpperCase().replace(/\s+/g, '');
}

function getAirspaceStyle(props) {
  const cls = props.icaoClass;
  const type = props.type;
  const name = String(props.name || '').toUpperCase();
  if (cls === 5 || name.startsWith('NZG') || name.includes('NZG') || name.includes('NZT')) {
    return { color: '#4488ff', weight: 1.2, opacity: 0.7, fillColor: '#4488ff', fillOpacity: 0.06 };
  }
  if (cls === 8) {
    return { color: '#ff2222', weight: 1.5, opacity: 0.85, fillColor: '#ff2222', fillOpacity: 0.1, dashArray: '5 3' };
  }
  if (cls === 1) {
    return { color: '#00aaff', weight: 1.5, opacity: 0.85, fillColor: '#00aaff', fillOpacity: 0.06 };
  }
  if (type === 4 || name.includes(' CTR')) {
    return { color: '#cc44ff', weight: 1.5, opacity: 0.85, fillColor: '#cc44ff', fillOpacity: 0.1 };
  }
  if (cls === 2 || cls === 3) {
    return { color: '#cc44ff', weight: 1.2, opacity: 0.75, fillOpacity: 0 };
  }
  if (cls === 0) {
    return { color: '#00aaff', weight: 2, opacity: 0.85, fillColor: '#00aaff', fillOpacity: 0.07, dashArray: '1 7', lineCap: 'round' };
  }
  return { color: '#00aaff', weight: 1.5, opacity: 0.75, fillColor: '#00aaff', fillOpacity: 0.06 };
}

async function loadAirspace() {
  try {
    const gcsUrl = 'https://storage.googleapis.com/29f98e10-a489-4c82-ae5e-489dbcd4912f/nz_asp.geojson';
    const res = await fetch(`${PROXY}/?url=${encodeURIComponent(gcsUrl)}`);
    const geojson = await res.json();
    L.geoJSON(geojson, {
      filter: f => {
        const n = normalizeAspName(f.properties.name || f.properties.Name || f.properties.AN || '');
        for (const a of ALLOWED_ASP) { if (n.includes(a)) return true; }
        return false;
      },
      style: f => getAirspaceStyle(f.properties),
      interactive: false,
    }).addTo(map).bringToBack();
  } catch (e) {
    console.warn('Airspace load failed:', e.message);
  }
}

fetchQNH();
loadAirspace();
fetchFlights();
setInterval(fetchFlights, 30000);
</script>
</body>
</html>
